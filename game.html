<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد TV</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000814;
  color:white;
  text-align:center;
  overflow:hidden;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
  font-size:20px;
}

.score{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.box{
  background:#111;
  border:1px solid gold;
  padding:10px;
  width:40%;
}

/* اللوحة */
.board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  padding:10px;
}

.cat{
  background:#111;
  border:1px solid gold;
  padding:8px;
  color:gold;
  font-weight:bold;
}

.cell{
  background:#003566;
  border:1px solid gold;
  padding:18px;
  cursor:pointer;
}

.cell.used{
  background:#222;
  color:#555;
  pointer-events:none;
}

/* شاشة السؤال */
.screen{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  padding:20px;
}

.q{
  margin-top:40px;
  color:gold;
  font-size:22px;
}

/* فوز */
.win{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.win h1{
  color:gold;
  font-size:40px;
  animation:pop 1s infinite alternate;
}

@keyframes pop{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* كونفيتي */
.confetti{
  position:fixed;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="header">📺 اقعد TV</div>

<div class="score">
  <div class="box">A: <span id="a">0</span></div>
  <div class="box">B: <span id="b">0</span></div>
</div>

<div class="board" id="board"></div>

<div class="screen" id="screen">
  <div class="q" id="q"></div>
  <div id="answers"></div>
  <div id="result"></div>
</div>

<div class="win" id="win">
  <h1 id="winner"></h1>
  <button onclick="location.reload()">إعادة اللعب</button>
</div>

<canvas class="confetti" id="confetti"></canvas>

<script>

let a=0,b=0;
let turn="A";
let used={};
let currentCorrect=0;
const WIN=5;

/* 🔊 صوت */
function sound(type){
  let ctx=new (window.AudioContext||window.webkitAudioContext)();
  let o=ctx.createOscillator();
  o.type="sine";
  o.frequency.value = type==="win"?800:300;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),150);
}

/* البيانات */
const Q = {
kuwait:{
200:{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
400:{q:"أشهر برج؟",a:["التحرير","خليفة","إيفل"],c:0}
},
general:{
200:{q:"كم كوكب؟",a:["8","9","7"],c:0},
400:{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0}
},
flags:{
200:{q:"علم اليابان؟",a:["شمس","نجمة","هلال"],c:0},
400:{q:"علم فرنسا؟",a:["أزرق أبيض أحمر","أخضر","أسود"],c:0}
}
};

/* بناء اللوحة */
function build(){
  let board=document.getElementById("board");
  board.innerHTML="";

  for(let cat in Q){

    let t=document.createElement("div");
    t.className="cat";
    t.innerText=cat;
    board.appendChild(t);

    for(let p in Q[cat]){

      let key=cat+p;

      let c=document.createElement("div");
      c.className="cell";
      c.innerText=p;

      if(used[key]) c.classList.add("used");

      c.onclick=()=>open(cat,p,key);

      board.appendChild(c);
    }
  }
}

/* فتح السؤال */
function open(cat,p,key){

  if(used[key]) return;
  used[key]=true;

  let qObj=Q[cat][p];
  currentCorrect=qObj.c;

  document.getElementById("screen").style.display="block";
  document.getElementById("q").innerText="Team "+turn+" : "+qObj.q;

  let box=document.getElementById("answers");
  box.innerHTML="";
  document.getElementById("result").innerHTML="";

  qObj.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(i,qObj);
    box.appendChild(b);
  });

  build();
}

/* التحقق */
function check(i,qObj){

  document.getElementById("result").innerHTML=
  "✔ الصحيح: "+qObj.a[currentCorrect];

  let aBtn=document.createElement("button");
  let bBtn=document.createElement("button");

  aBtn.innerText="Team A";
  bBtn.innerText="Team B";

  aBtn.onclick=()=>give("A",i===currentCorrect);
  bBtn.onclick=()=>give("B",i===currentCorrect);
}

/* إعطاء النقاط */
function give(team,correct){

  sound(correct?"win":"");

  if(correct){
    if(team==="A")a++;
    else b++;
  }

  document.getElementById("a").innerText=a;
  document.getElementById("b").innerText=b;

  document.getElementById("screen").style.display="none";

  turn=(turn==="A")?"B":"A";

  if(a>=WIN || b>=WIN){
    end();
    return;
  }

  build();
}

/* الفوز */
function end(){

  sound("win");

  let w = (a>b) ? "🏆 Team A فاز!" : "🏆 Team B فاز!";

  document.getElementById("winner").innerText=w;
  document.getElementById("win").style.display="flex";

  confetti();
}

/* كونفيتي بسيط */
function confetti(){
  let c=document.getElementById("confetti");
  let ctx=c.getContext("2d");
  c.width=window.innerWidth;
  c.height=window.innerHeight;

  let pieces=[];

  for(let i=0;i<100;i++){
    pieces.push({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      r:Math.random()*6
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="gold";

    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
      p.y+=2;
      if(p.y>c.height)p.y=0;
    });

    requestAnimationFrame(draw);
  }

  draw();
}

build();

</script>

</body>
</html>

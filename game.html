<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000814;
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
}

/* الفئات المختارة */
.selectedCats{
  background:#111;
  padding:10px;
  color:gold;
}

/* اللوحة */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:10px;
}

.catTitle{
  background:#111;
  border:1px solid gold;
  padding:8px;
  font-weight:bold;
}

.cell{
  background:#003566;
  border:1px solid gold;
  padding:18px;
  cursor:pointer;
}

.cell.used{
  background:#222;
  color:#555;
  pointer-events:none;
}

/* السؤال */
.screen{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000;
  padding:20px;
}

.q{
  margin-top:40px;
  color:gold;
  font-size:22px;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

/* النتيجة */
.score{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.box{
  background:#111;
  border:1px solid gold;
  padding:10px;
  width:40%;
}

/* الفوز */
.win{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:black;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.win h1{
  color:gold;
  font-size:40px;
}
</style>
</head>

<body>

<div class="header">🎮 اقعد</div>

<div class="selectedCats" id="catsList"></div>

<div class="score">
  <div class="box">A: <span id="a">0</span></div>
  <div class="box">B: <span id="b">0</span></div>
</div>

<div class="board" id="board"></div>

<div class="screen" id="screen">

  <div class="q" id="q"></div>
  <div id="answers"></div>
  <div id="result"></div>

</div>

<div class="win" id="win">
  <h1 id="winner"></h1>
  <button onclick="location.reload()">إعادة اللعب</button>
</div>

<script>

let cats = JSON.parse(localStorage.getItem("cats")||"[]");

let a=0,b=0;
let turn="A";
let used={};
let currentCorrect=0;

const WIN=5; // الفوز عند 5 نقاط

const Q = {
kuwait:{
200:{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
400:{q:"أشهر برج؟",a:["التحرير","خليفة","إيفل"],c:0}
},
general:{
200:{q:"كم كوكب؟",a:["8","9","7"],c:0},
400:{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0}
},
flags:{
200:{q:"علم اليابان؟",a:["شمس حمراء","نجمة","هلال"],c:0},
400:{q:"علم فرنسا؟",a:["أزرق أبيض أحمر","أخضر","أسود"],c:0}
},
islam:{
200:{q:"كم عدد أجزاء القرآن؟",a:["30","20","114"],c:0},
400:{q:"سورة الفاتحة كم آية؟",a:["7","5","10"],c:0}
}
};

function showCats(){
  document.getElementById("catsList").innerText =
  "الفئات: " + cats.join(" | ");
}

function build(){

  let board=document.getElementById("board");
  board.innerHTML="";

  for(let cat in Q){

    if(!cats.includes(cat)) continue;

    let t=document.createElement("div");
    t.className="catTitle";
    t.innerText=cat;
    board.appendChild(t);

    for(let p in Q[cat]){

      let key=cat+p;

      let c=document.createElement("div");
      c.className="cell";
      c.innerText=p;

      if(used[key]) c.classList.add("used");

      c.onclick=()=>open(cat,p,key);

      board.appendChild(c);
    }
  }
}

function open(cat,p,key){

  if(used[key]) return;
  used[key]=true;

  let qObj=Q[cat][p];
  currentCorrect=qObj.c;

  document.getElementById("screen").style.display="block";
  document.getElementById("q").innerText="Team "+turn+": "+qObj.q;

  let box=document.getElementById("answers");
  box.innerHTML="";
  document.getElementById("result").innerHTML="";

  qObj.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(i,qObj);
    box.appendChild(b);
  });

  build();
}

function check(i,qObj){

  document.getElementById("result").innerHTML=
  "✔ الصحيح: "+qObj.a[currentCorrect];

  let aBtn=document.createElement("button");
  let bBtn=document.createElement("button");

  aBtn.innerText="A صحيح";
  bBtn.innerText="B صحيح";

  aBtn.onclick=()=>give("A",i===currentCorrect);
  bBtn.onclick=()=>give("B",i===currentCorrect);

  document.getElementById("result").appendChild(document.createElement("br"));
  document.getElementById("result").appendChild(aBtn);
  document.getElementById("result").appendChild(bBtn);
}

function give(team,correct){

  if(correct){
    if(team==="A")a++;
    else b++;
  }

  document.getElementById("a").innerText=a;
  document.getElementById("b").innerText=b;

  document.getElementById("screen").style.display="none";

  turn=(turn==="A")?"B":"A";

  if(a>=WIN || b>=WIN){
    end();
    return;
  }

  build();
}

function end(){

  let w = (a>b) ? "🏆 Team A فاز!" : "🏆 Team B فاز!";

  document.getElementById("winner").innerText=w;
  document.getElementById("win").style.display="flex";
}

showCats();
build();

</script>

</body>
</html>

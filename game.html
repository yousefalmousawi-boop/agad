<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#000,#001a33);
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:5px;
  padding:10px;
}

.cell{
  background:#111;
  border:1px solid gold;
  padding:15px;
  cursor:pointer;
}

.cell.used{
  background:#333;
  color:#666;
  pointer-events:none;
}

.panel{
  margin:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

#answerBox{
  margin-top:10px;
  color:gold;
}
</style>
</head>

<body>

<div class="header">🎮 اقعد - مصحح</div>

<div class="grid" id="board"></div>

<div class="panel">

<div id="q"></div>

<div id="answers"></div>

<div id="answerBox"></div>

</div>

<script>

let turn="A";
let currentCorrect=0;
let answered=false;

const Q = {
kuwait:{
200:{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
400:{q:"أشهر برج؟",a:["التحرير","برج خليفة","إيفل"],c:0}
},
general:{
200:{q:"كم كوكب؟",a:["8","9","7"],c:0},
400:{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0}
},
flags:{
200:{q:"علم اليابان؟",a:["شمس حمراء","نجمة","هلال"],c:0},
400:{q:"علم فرنسا؟",a:["أزرق/أبيض/أحمر","أخضر","أسود"],c:0}
}
};

let used={};

function buildBoard(){
  let board=document.getElementById("board");
  board.innerHTML="";

  for(let cat in Q){
    for(let points in Q[cat]){

      let key=cat+points;

      let div=document.createElement("div");
      div.className="cell";
      div.innerText=cat+" "+points;

      if(used[key]) div.classList.add("used");

      div.onclick=()=>openQ(cat,points,key,div);

      board.appendChild(div);
    }
  }
}

function openQ(cat,points,key,cell){

  if(used[key]) return;

  used[key]=true;
  answered=false;

  currentCorrect = Q[cat][points].c;

  let qObj = Q[cat][points];

  document.getElementById("q").innerText =
  "Team "+turn+": "+qObj.q;

  let box=document.getElementById("answers");
  box.innerHTML="";
  document.getElementById("answerBox").innerHTML="";

  qObj.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(i,qObj);
    box.appendChild(b);
  });

  cell.classList.add("used");
}

function check(i,qObj){

  if(answered) return;
  answered=true;

  let box=document.getElementById("answerBox");

  box.innerHTML="✔ الإجابة الصحيحة: "+qObj.a[currentCorrect];

  let aBtn=document.createElement("button");
  let bBtn=document.createElement("button");

  aBtn.innerText="Team A";
  bBtn.innerText="Team B";

  aBtn.onclick=()=>give("A",i===currentCorrect);
  bBtn.onclick=()=>give("B",i===currentCorrect);

  box.appendChild(document.createElement("br"));
  box.appendChild(aBtn);
  box.appendChild(bBtn);
}

function give(team,correct){

  if(correct){
    alert("✔ صح!");
  }else{
    alert("✖ غلط!");
  }

  turn = (turn==="A")?"B":"A";

  buildBoard();
}

buildBoard();

</script>

</body>
</html>

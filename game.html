<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة سين جيم</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#000,#001a33);
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
}

.score{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

.box{
  background:#111;
  padding:10px;
  border:1px solid gold;
  width:40%;
  border-radius:10px;
}

.card{
  margin:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

button{
  width:80%;
  margin:6px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

#timer{
  font-size:25px;
  color:red;
}

.img{
  width:120px;
  height:120px;
  margin:10px auto;
  background:#333;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="header">🎮 TV QUIZ GAME</div>

<div class="score">
  <div class="box">Team A<br><span id="a">0</span></div>
  <div class="box">Team B<br><span id="b">0</span></div>
</div>

<div class="card">
  <div id="cat"></div>
  <div class="img" id="img">📷</div>
  <div id="timer">60</div>
  <div id="q"></div>
  <div id="answers"></div>
</div>

<script>
let cats = JSON.parse(localStorage.getItem("cats")||"[]");

let a=0,b=0;
let turn="A";
let time=60;
let interval;

const data = {
  kuwait:[
    {q:"ما عاصمة الكويت؟",a:["الكويت","الجبيل","دبي"],c:0,img:"🇰🇼"}
  ],
  general:[
    {q:"كم كوكب في النظام الشمسي؟",a:["8","9","7"],c:0,img:"🌍"}
  ],
  media:[
    {q:"ما معنى إعلام؟",a:["صحافة","رياضة","طب"],c:0,img:"📺"}
  ],
  football:[
    {q:"كم لاعب في الفريق؟",a:["11","10","9"],c:0,img:"⚽"}
  ],
  arabi:[
    {q:"لون نادي العربي؟",a:["أخضر","أحمر","أزرق"],c:0,img:"🟢"}
  ],
  qadsia:[
    {q:"لون القادسية؟",a:["أصفر","أخضر","أسود"],c:0,img:"🟡"}
  ]
};

function getRandomCat(){
  return cats[Math.floor(Math.random()*cats.length)];
}

function load(){
  let c=getRandomCat();
  let q=data[c][0];

  document.getElementById("cat").innerText=c;
  document.getElementById("img").innerText=q.img;
  document.getElementById("q").innerText="Team "+turn+": "+q.q;

  let box=document.getElementById("answers");
  box.innerHTML="";

  q.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>{
      if(i===q.c){
        if(turn==="A")a++; else b++;
      }
      document.getElementById("a").innerText=a;
      document.getElementById("b").innerText=b;
      next();
    };
    box.appendChild(b);
  });

  startTimer(q);
}

function startTimer(q){
  clearInterval(interval);
  time=60;
  document.getElementById("timer").innerText=time;

  interval=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=time;

    if(time<=0){
      next();
    }
  },1000);
}

function next(){
  clearInterval(interval);
  turn=(turn==="A")?"B":"A";
  load();
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد - اللعبة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#000,#001a33);
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
}

.score{
  display:flex;
  justify-content:space-around;
  margin:10px;
}

.box{
  background:#111;
  border:1px solid gold;
  padding:10px;
  width:40%;
  border-radius:10px;
}

.panel{
  margin:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

button{
  width:80%;
  margin:5px;
  padding:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

#answerBox{
  margin-top:10px;
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🎮 اقعد</div>

<div class="score">
  <div class="box">A<br><span id="a">0</span></div>
  <div class="box">B<br><span id="b">0</span></div>
</div>

<div class="panel">

<div id="cat"></div>
<div id="q"></div>

<div id="controls">
<button onclick="pick(200)">200</button>
<button onclick="pick(400)">400</button>
<button onclick="pick(600)">600</button>
</div>

<div id="answers"></div>

<div id="answerBox"></div>

</div>

<script>

let cats = JSON.parse(localStorage.getItem("cats")||"[]");

let a=0,b=0;
let turn="A";

let currentCat="";
let currentPoints=0;

const Q = {
kuwait:{
200:{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
400:{q:"أشهر ميناء؟",a:["الشويخ","جدة","بيروت"],c:0},
600:{q:"كم محافظة؟",a:["6","5","7"],c:0}
},
general:{
200:{q:"كم كوكب؟",a:["8","9","7"],c:0},
400:{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0},
600:{q:"أطول نهر؟",a:["النيل","دجلة","الفرات"],c:0}
},
media:{
200:{q:"الإعلام يعني؟",a:["صحافة","طب","هندسة"],c:0},
400:{q:"TV اختصار؟",a:["تلفزيون","كمبيوتر","هاتف"],c:0},
600:{q:"الصحف؟",a:["وسائل إعلام","رياضة","طب"],c:0}
},
football:{
200:{q:"عدد اللاعبين؟",a:["11","10","9"],c:0},
400:{q:"بطولة الكويت؟",a:["الدوري","كأس العالم","يويفا"],c:0},
600:{q:"أفضل نادي؟",a:["الكويت","العربي","كلهم"],c:0}
},
arabi:{
200:{q:"لون النادي؟",a:["أخضر","أحمر","أزرق"],c:0},
400:{q:"ملعبه؟",a:["الصداقة","جابر","المدينة"],c:0},
600:{q:"تأسس؟",a:["1960","1950","1970"],c:0}
},
qadsia:{
200:{q:"لون القادسية؟",a:["أصفر","أخضر","أزرق"],c:0},
400:{q:"ملعبه؟",a:["جابر","الصداقة","الفحيحيل"],c:0},
600:{q:"بطولاته؟",a:["كثيرة","قليلة","صفر"],c:0}
}
};

function pick(points){
  currentCat = cats[Math.floor(Math.random()*cats.length)];
  currentPoints = points;

  document.getElementById("cat").innerText="Category: "+currentCat;

  let q = Q[currentCat][points];

  document.getElementById("q").innerText="Team "+turn+": "+q.q;

  let box = document.getElementById("answers");
  box.innerHTML="";

  document.getElementById("answerBox").innerHTML="";

  q.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;

    b.onclick=()=>check(i);

    box.appendChild(b);
  });
}

function check(i){
  let q = Q[currentCat][currentPoints];

  let box=document.getElementById("answerBox");

  box.innerHTML="الإجابة الصحيحة: "+q.a[q.c];

  let btnA=document.createElement("button");
  btnA.innerText="Team A صح";

  let btnB=document.createElement("button");
  btnB.innerText="Team B صح";

  btnA.onclick=()=>give("A",i===q.c);
  btnB.onclick=()=>give("B",i===q.c);

  box.appendChild(document.createElement("br"));
  box.appendChild(btnA);
  box.appendChild(btnB);
}

function give(team,correct){
  if(correct){
    if(team==="A")a+=currentPoints;
    else b+=currentPoints;
  }

  document.getElementById("a").innerText=a;
  document.getElementById("b").innerText=b;

  turn = (turn==="A")?"B":"A";

  document.getElementById("answerBox").innerHTML="";

  pick(currentPoints);
}

</script>

</body>
</html>

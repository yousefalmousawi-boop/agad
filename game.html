<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد - اللعبة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#000,#001a33);
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
}

.panel{
  margin:10px;
  padding:10px;
  background:#111;
  border-radius:10px;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

.catBtn{
  background:#333;
}

.catBtn.active{
  background:gold;
  color:black;
}

#answerBox{
  margin-top:10px;
  color:gold;
}
</style>
</head>

<body>

<div class="header">🎮 اقعد - يوسف البطل</div>

<div class="panel">

<h3>اختر فئة قبل السؤال</h3>
<div id="cats"></div>

<div id="q"></div>

<div id="answers"></div>

<div id="answerBox"></div>

</div>

<script>

let cats = JSON.parse(localStorage.getItem("cats")||"[]");

let currentCat="";
let currentQ=null;

let a=0,b=0;
let turn="A";

const Q = {
kuwait:[
{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
{q:"أشهر برج؟",a:["التحرير","برج خليفة","إيفل"],c:0}
],
general:[
{q:"كم كوكب؟",a:["8","9","7"],c:0},
{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0}
],
flags:[
{q:"علم اليابان؟",a:["شمس حمراء","نجمة","هلال"],c:0},
{q:"علم فرنسا؟",a:["أزرق/أبيض/أحمر","أخضر","أسود"],c:0}
],
quran:[
{q:"كم سورة في القرآن؟",a:["114","100","120"],c:0},
{q:"أول سورة؟",a:["الفاتحة","البقرة","الإخلاص"],c:0}
],
culture:[
{q:"عاصمة فرنسا؟",a:["باريس","روما","مدريد"],c:0},
{q:"أكبر دولة؟",a:["روسيا","كندا","الصين"],c:0}
],
media:[
{q:"TV اختصار؟",a:["تلفزيون","هاتف","راديو"],c:0},
{q:"وسائل الإعلام؟",a:["صحف","أكل","رياضة"],c:0}
]
};

function renderCats(){
  let box=document.getElementById("cats");
  box.innerHTML="";

  cats.forEach(c=>{
    let b=document.createElement("button");
    b.className="catBtn";
    b.innerText=c;

    b.onclick=()=>{
      document.querySelectorAll(".catBtn").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      startQ(c);
    };

    box.appendChild(b);
  });
}

function startQ(cat){

  currentCat = cat;
  let arr = Q[cat];
  currentQ = arr[Math.floor(Math.random()*arr.length)];

  document.getElementById("q").innerText="Team "+turn+": "+currentQ.q;

  let box=document.getElementById("answers");
  box.innerHTML="";
  document.getElementById("answerBox").innerHTML="";

  currentQ.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(i);
    box.appendChild(b);
  });
}

function check(i){

  let box=document.getElementById("answerBox");

  box.innerHTML="✔ الإجابة الصحيحة: "+currentQ.a[currentQ.c];

  let aBtn=document.createElement("button");
  let bBtn=document.createElement("button");

  aBtn.innerText="Team A";
  bBtn.innerText="Team B";

  aBtn.onclick=()=>give("A",i===currentQ.c);
  bBtn.onclick=()=>give("B",i===currentQ.c);

  box.appendChild(document.createElement("br"));
  box.appendChild(aBtn);
  box.appendChild(bBtn);
}

function give(team,correct){

  if(correct){
    if(team==="A")a++;
    else b++;
  }

  turn = (turn==="A")?"B":"A";

  renderCats();
}

renderCats();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000814;
  color:white;
  text-align:center;
}

.header{
  background:gold;
  color:black;
  padding:10px;
  font-weight:bold;
  font-size:20px;
}

/* لوحة الفئات */
.board{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  padding:10px;
}

.cat{
  background:#111;
  border:1px solid gold;
  border-radius:8px;
  padding:10px;
  font-weight:bold;
}

.cell{
  background:#003566;
  border:1px solid gold;
  padding:20px;
  border-radius:6px;
  cursor:pointer;
  font-size:18px;
}

.cell.used{
  background:#222;
  color:#555;
  pointer-events:none;
}

/* شاشة السؤال */
.questionScreen{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:#000;
  padding:20px;
}

.qBox{
  margin-top:50px;
  font-size:22px;
  color:gold;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}
</style>
</head>

<body>

<div class="header">🎮 اقعد</div>

<div class="board" id="board"></div>

<!-- شاشة السؤال -->
<div class="questionScreen" id="screen">

  <div class="qBox" id="q"></div>

  <div id="answers"></div>

  <div id="result"></div>

</div>

<script>

let turn="A";
let used={};

const Q = {
kuwait:{
200:{q:"عاصمة الكويت؟",a:["الكويت","دبي","الدوحة"],c:0},
400:{q:"أشهر برج بالكويت؟",a:["التحرير","إيفل","خليفة"],c:0}
},
general:{
200:{q:"كم كوكب؟",a:["8","9","7"],c:0},
400:{q:"أكبر قارة؟",a:["آسيا","أوروبا","أفريقيا"],c:0}
},
flags:{
200:{q:"علم اليابان؟",a:["شمس حمراء","نجمة","هلال"],c:0},
400:{q:"علم فرنسا؟",a:["أزرق أبيض أحمر","أخضر","أسود"],c:0}
}
};

let currentCorrect=0;

function build(){

  let board=document.getElementById("board");
  board.innerHTML="";

  for(let cat in Q){

    // اسم الفئة
    let title=document.createElement("div");
    title.className="cat";
    title.innerText=cat;
    board.appendChild(title);

    for(let points in Q[cat]){

      let key=cat+points;

      let cell=document.createElement("div");
      cell.className="cell";
      cell.innerText=points;

      if(used[key]) cell.classList.add("used");

      cell.onclick=()=>open(cat,points,key);

      board.appendChild(cell);
    }
  }
}

function open(cat,points,key){

  if(used[key]) return;
  used[key]=true;

  let qObj = Q[cat][points];
  currentCorrect = qObj.c;

  document.getElementById("screen").style.display="block";
  document.getElementById("q").innerText="Team "+turn+" : "+qObj.q;

  let box=document.getElementById("answers");
  box.innerHTML="";
  document.getElementById("result").innerHTML="";

  qObj.a.forEach((x,i)=>{
    let b=document.createElement("button");
    b.innerText=x;
    b.onclick=()=>check(i,qObj);
    box.appendChild(b);
  });

  build();
}

function check(i,qObj){

  document.getElementById("result").innerHTML=
  "✔ الإجابة الصحيحة: "+qObj.a[currentCorrect];

  let aBtn=document.createElement("button");
  let bBtn=document.createElement("button");

  aBtn.innerText="Team A صح";
  bBtn.innerText="Team B صح";

  aBtn.onclick=()=>give("A",i===currentCorrect);
  bBtn.onclick=()=>give("B",i===currentCorrect);

  let box=document.getElementById("result");
  box.appendChild(document.createElement("br"));
  box.appendChild(aBtn);
  box.appendChild(bBtn);
}

function give(team,correct){

  if(correct){
    alert("✔ صح");
  }else{
    alert("✖ غلط");
  }

  turn = (turn==="A")?"B":"A";

  document.getElementById("screen").style.display="none";

  build();
}

build();

</script>

</body>
</html>

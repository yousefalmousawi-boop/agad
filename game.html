<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AGAD TV Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:#ececec;
}

/* TOP */
.topbar{
background:linear-gradient(to right,#ff7b45,#ff3d3d);
color:white;
padding:15px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.scoreboard{
display:flex;
justify-content:space-around;
padding:10px;
background:white;
font-size:20px;
}

/* CATEGORIES */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}

.card{
background:white;
padding:20px;
text-align:center;
font-size:22px;
border-radius:15px;
cursor:pointer;
}

/* SCREEN */
.screen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
color:white;
padding:20px;
}

.big{
font-size:30px;
margin-top:50px;
text-align:center;
}

.btn{
display:block;
margin:10px auto;
padding:15px;
font-size:20px;
width:80%;
border:none;
border-radius:10px;
cursor:pointer;
}

.green{background:lime;}
.red{background:red;}
.gray{background:#555;}
.gold{background:gold;color:black;}
</style>
</head>

<body>

<div class="topbar">📺 AGAD TV</div>

<div class="scoreboard">
<div id="a"></div>
<div id="b"></div>
</div>

<!-- CATEGORIES -->
<div class="grid" id="grid"></div>

<!-- QUESTION -->
<div class="screen" id="qScreen">
<div class="big" id="question"></div>

<button class="btn gold" onclick="showAnswer()">Show Answer</button>

<div id="answerBox" style="text-align:center;margin-top:20px;"></div>

<div id="who" style="margin-top:20px;"></div>

<button class="btn gray" onclick="finish()">Finish</button>
</div>

<script>

let teamA = localStorage.getItem("teamA") || "Team 1";
let teamB = localStorage.getItem("teamB") || "Team 2";

let scoreA = 0;
let scoreB = 0;

document.getElementById("a").innerText = teamA + ": 0";
document.getElementById("b").innerText = teamB + ": 0";

const data = {
"Cars":"Who makes the Wrangler? Jeep",
"Flags":"What country is 🇯🇵? Japan",
"Geography":"What is largest continent? Asia"
};

let currentAnswer = "";
let chosenTeam = "";

/* BUILD */
let grid = document.getElementById("grid");

for(let c in data){
let div = document.createElement("div");
div.className = "card";
div.innerText = c;

div.onclick = () => openQuestion(c);

grid.appendChild(div);
}

function openQuestion(cat){
document.getElementById("qScreen").style.display = "block";
document.getElementById("question").innerText = data[cat].split("?")[0] + "?";
currentAnswer = data[cat].split(" ")[data[cat].split(" ").length-1];

document.getElementById("answerBox").innerText = "";
document.getElementById("who").innerHTML = "";
chosenTeam = "";
}

function showAnswer(){
document.getElementById("answerBox").innerHTML =
"Answer: " + currentAnswer + "<br><br>";

document.getElementById("who").innerHTML = `
<button class="btn green" onclick="pick('A')">${teamA}</button>
<button class="btn green" onclick="pick('B')">${teamB}</button>
<button class="btn red" onclick="pick('N')">Nobody</button>
`;
}

function pick(t){
chosenTeam = t;
}

function finish(){

if(chosenTeam === "A") scoreA++;
if(chosenTeam === "B") scoreB++;

document.getElementById("a").innerText = teamA + ": " + scoreA;
document.getElementById("b").innerText = teamB + ": " + scoreB;

document.getElementById("qScreen").style.display = "none";
}

</script>

</body>
</html>

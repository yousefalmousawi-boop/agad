<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#001a33,#000);
  color:white;
  text-align:center;
}

h1{color:gold}

.title{
  color:gold;
  font-size:22px;
  margin:10px;
}

.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  padding:10px;
}

.cat{
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid gold;
  cursor:pointer;
}

.cat.active{
  background:gold;
  color:black;
}

button{
  width:80%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:gold;
  color:black;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🎮 اقعد</h1>
<div class="title">👑 يوسف البطل</div>

<div class="grid">

<div class="cat" onclick="toggle(this,'kuwait')">🇰🇼 الكويت</div>
<div class="cat" onclick="toggle(this,'general')">🌍 معلومات عامة</div>
<div class="cat" onclick="toggle(this,'flags')">🏳️ أعلام دول</div>
<div class="cat" onclick="toggle(this,'quran')">🕌 القرآن الكريم</div>
<div class="cat" onclick="toggle(this,'culture')">📚 ثقافة عامة</div>
<div class="cat" onclick="toggle(this,'media')">📺 إعلام</div>

</div>

<button onclick="start()">▶ بدء اللعبة</button>

<script>
let selected=[];

function toggle(el,val){
  if(selected.includes(val)){
    selected = selected.filter(x=>x!==val);
    el.classList.remove("active");
  }else{
    selected.push(val);
    el.classList.add("active");
  }
}

function start(){
  if(selected.length===0){
    alert("اختر فئة");
    return;
  }
  localStorage.setItem("cats",JSON.stringify(selected));
  location.href="game.html";
}
</script>

</body>
</html>

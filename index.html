<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seen Jeem Style Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #0b1b2b, #000);
  color: white;
  text-align: center;
}

/* Top bar like TV show */
.header {
  background: linear-gradient(90deg, #002b5b, #caa24a);
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
}

.scoreboard {
  display: flex;
  justify-content: space-around;
  margin: 15px;
}

.team {
  background: #111;
  padding: 10px;
  border-radius: 12px;
  width: 40%;
  border: 1px solid #caa24a;
}

.card {
  background: #111;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid #333;
}

.category {
  color: #caa24a;
  font-size: 18px;
}

.question {
  font-size: 20px;
  margin: 15px 0;
}

button {
  width: 80%;
  padding: 12px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  background: #222;
  color: white;
}

button:hover {
  background: #caa24a;
  color: black;
}

#next {
  background: #caa24a;
  color: black;
  display: none;
}
</style>
</head>

<body>

<div class="header">🇰🇼 سين جيم - Style Game</div>

<div class="scoreboard">
  <div class="team">Team A<br><span id="a">0</span></div>
  <div class="team">Team B<br><span id="b">0</span></div>
</div>

<div class="card">
  <div class="category" id="cat"></div>
  <div class="question" id="q"></div>

  <div id="answers"></div>

  <button id="next" onclick="nextQ()">Next</button>
</div>

<script>
let aScore = 0;
let bScore = 0;
let turn = "A";

const data = [
  {
    cat: "🇰🇼 Kuwait",
    q: "What is Kuwait famous for?",
    a: ["Oil", "Snow", "Volcanoes", "Forests"],
    c: 0
  },
  {
    cat: "⚽ Sports",
    q: "How many players in football?",
    a: ["7", "9", "11", "12"],
    c: 2
  },
  {
    cat: "🌍 General",
    q: "Capital of France?",
    a: ["Paris", "London", "Rome", "Berlin"],
    c: 0
  },
  {
    cat: "🕌 Culture",
    q: "Main religion in Kuwait?",
    a: ["Islam", "Hinduism", "Buddhism", "Christianity"],
    c: 0
  }
];

let i = 0;

function load() {
  document.getElementById("next").style.display = "none";

  let d = data[i];
  document.getElementById("cat").innerText = d.cat;
  document.getElementById("q").innerText = "Team " + turn + ": " + d.q;

  let box = document.getElementById("answers");
  box.innerHTML = "";

  d.a.forEach((ans, index) => {
    let btn = document.createElement("button");
    btn.innerText = ans;

    btn.onclick = () => {
      if (index === d.c) {
        if (turn === "A") aScore++;
        else bScore++;
      }

      document.getElementById("a").innerText = aScore;
      document.getElementById("b").innerText = bScore;

      document.getElementById("next").style.display = "block";
    };

    box.appendChild(btn);
  });
}

function nextQ() {
  i++;
  if (i >= data.length) {
    document.getElementById("q").innerText =
      aScore > bScore ? "Team A Wins 🏆" :
      bScore > aScore ? "Team B Wins 🏆" :
      "Draw 🤝";

    document.getElementById("answers").innerHTML = "";
    document.getElementById("next").style.display = "none";
    return;
  }

  turn = turn === "A" ? "B" : "A";
  load();
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>AGAD TV - Setup</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

input{
padding:15px;
margin:10px;
font-size:20px;
border-radius:10px;
border:none;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:10px;
background:#ff3d3d;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<h1>🎮 AGAD TV Setup</h1>

<input id="teamA" placeholder="Team 1 Name">
<input id="teamB" placeholder="Team 2 Name">

<button onclick="startGame()">Start Game</button>

<script>
function startGame(){
let a = document.getElementById("teamA").value || "Team 1";
let b = document.getElementById("teamB").value || "Team 2";

localStorage.setItem("teamA", a);
localStorage.setItem("teamB", b);

window.location.href = "game.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد - اختيار الفئات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#001a33,#000);
  color:white;
  text-align:center;
}

h1{color:gold}

.card{
  background:#111;
  margin:10px;
  padding:10px;
  border:1px solid gold;
  border-radius:10px;
}

button{
  width:80%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

.start{
  background:gold;
  color:black;
  font-size:18px;
}
</style>
</head>

<body>

<h1>🎮 اختر الفئات</h1>

<div class="card">

<button onclick="add('kuwait')">🇰🇼 الكويت</button>
<button onclick="add('general')">🌍 معلومات عامة</button>
<button onclick="add('flags')">🏳️ أعلام دول</button>
<button onclick="add('football')">⚽ كرة قدم</button>
<button onclick="add('arabi')">🟢 العربي</button>
<button onclick="add('qadsia')">🟡 القادسية</button>

</div>

<button class="start" onclick="go()">▶ لعب</button>

<script>
let cats=[];

function add(c){
  if(!cats.includes(c)) cats.push(c);
}

function go(){
  if(cats.length===0){
    alert("اختر فئة");
    return;
  }
  localStorage.setItem("cats",JSON.stringify(cats));
  location.href="game.html";
}
</script>

</body>
</html>

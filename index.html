<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اقعد - اختيار الفئات</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle,#001a33,#000);
  color:white;
  text-align:center;
}

h1{color:gold}

.grid{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid gold;
  padding:15px;
  border-radius:10px;
}

button{
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
}

button:active{
  background:gold;
  color:black;
}

.start{
  background:gold;
  color:black;
  font-size:18px;
  width:90%;
}
</style>
</head>

<body>

<h1>🎮 اختر الفئات</h1>

<div class="grid">

<div class="card">
الكويت 🇰🇼
<button onclick="pick('kuwait')">اختيار</button>
</div>

<div class="card">
معلومات عامة 🌍
<button onclick="pick('general')">اختيار</button>
</div>

<div class="card">
إعلام 📺
<button onclick="pick('media')">اختيار</button>
</div>

<div class="card">
كرة قدم كويتية ⚽
<button onclick="pick('football')">اختيار</button>
</div>

<div class="card">
نادي العربي 🟢
<button onclick="pick('arabi')">اختيار</button>
</div>

<div class="card">
نادي القادسية 🟡
<button onclick="pick('qadsia')">اختيار</button>
</div>

</div>

<button class="start" onclick="go()">▶ بدء اللعب</button>

<script>
let cats=[];

function pick(c){
  if(!cats.includes(c)) cats.push(c);
}

function go(){
  if(cats.length<1){
    alert("اختر فئة واحدة على الأقل");
    return;
  }
  localStorage.setItem("cats",JSON.stringify(cats));
  location.href="game.html";
}
</script>

</body>
</html>
